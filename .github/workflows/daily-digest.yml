name: Daily AI-Agent Digest

on:
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC = 07:00 ICT (Vietnam) — once daily
  workflow_dispatch: {}

concurrency:
  group: digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        run: go build -o bin/digest ./cmd/digest

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: ./bin/digest --once --notify-errors

      - name: Commit updated seen-state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --staged --quiet || git commit -m "chore: update seen state [skip ci]"
          git push
